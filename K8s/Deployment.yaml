apiVersion: apps/v1
kind: Deployment
metadata:
  name: website-deployment
  namespace: dev

spec:
  replicas: 2

  selector:
    matchLabels:
      app: website

  template:
    metadata:
      labels:
        app: website

    spec:
      containers:
        - name: website

          image: dakshata16/k8s-github-actions-project:v2

          imagePullPolicy: Always

          ports:
            - containerPort: 80
